<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:dc="http://typo3.org/ns/Slub/SlubDigitalcollections/ViewHelpers" data-namespace-typo3-fluid="true" lang="en">

<f:variable name="providerLogoXpath"><dc:xpath xpath='(//mets:amdSec/mets:rightsMD/mets:mdWrap[@OTHERMDTYPE="DVRIGHTS"]/mets:xmlData/dv:rights/dv:{provider}Logo)[1]' /></f:variable>
<f:variable name="providerXpath"><dc:xpath xpath='(//mets:amdSec/mets:rightsMD/mets:mdWrap[@OTHERMDTYPE="DVRIGHTS"]/mets:xmlData/dv:rights/dv:{provider})[1]' /></f:variable>
<f:variable name="providerSiteUrlXpath"><dc:xpath xpath='(//mets:amdSec/mets:rightsMD/mets:mdWrap[@OTHERMDTYPE="DVRIGHTS"]/mets:xmlData/dv:rights/dv:{provider}SiteURL)[1]' htmlspecialchars='FALSE' /></f:variable>
<f:alias map="{logoUrl: '{providerLogoXpath}', logoTitle: '{providerXpath}',
        logoUri: '{providerSiteUrlXpath}'}">
    <f:if condition="{dc:providerLogoCached(logo:'{logoUrl}')}">
        <li>
            <f:link.external uri="{logoUri}" title="{logoTitle}">
                <img src="/typo3temp/assets/images/{dc:providerLogoCached(logo:'{logoUrl}')}" width="108" title="{logoTitle}" alt="Logo von {logoTitle}" />
            </f:link.external>
        </li>
    </f:if>
</f:alias>

</html>
