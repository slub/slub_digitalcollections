<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"data-namespace-typo3-fluid="true" lang="en">

<f:if condition="{settings.showProviderLogo}">
    <ul>
        <f:variable name="provider">owner</f:variable>
        <f:render partial="Kitodo/DocumentFunctions/ProviderLogo" arguments="{_all}" />

        <f:variable name="provider">aggregator</f:variable>
        <f:render partial="Kitodo/DocumentFunctions/ProviderLogo" arguments="{_all}" />

        <f:variable name="provider">sponsor</f:variable>
        <f:render partial="Kitodo/DocumentFunctions/ProviderLogo" arguments="{_all}" />
    </ul>
</f:if>

</html>
